                 <!--add courses start-->
            <main>
                <section id="addcourses">
                <div class="words">
                    <h1>ADD COURSES</h1>
                    <hr>
                </div>
                <form>
                    <div> 
                        <label for="1">Course :</label>
                       <input  id="1" type="text" placeholder="Course Name" required>
                    </div>
                    <div>
                        <label for="2">Instructor :</label>
                         <input  id="2" type="text" placeholder="Instructor Name" required>
                    </div>
                    <div>
                        <label for="3">Hours :</label>
                         <input  id="3" type="number" placeholder="Hours" required>
                    </div>
                    <div>
                        <label for="4">Notes :</label>
                        <textarea id="4" placeholder="Note" cols="5" rows="3"></textarea>
                    </div>
                        <button type="submit">Add Course</button>
                </form>
                </section>
            </main>
